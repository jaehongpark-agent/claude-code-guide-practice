name: Claude Code Review

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          DIFF=$(git diff origin/${{ github.event.pull_request.base.ref }}...HEAD)
          echo "diff<<DIFF_EOF" >> "$GITHUB_OUTPUT"
          echo "$DIFF" >> "$GITHUB_OUTPUT"
          echo "DIFF_EOF" >> "$GITHUB_OUTPUT"

      - name: Claude Code Review
        id: review
        uses: anthropics/anthropic-sdk-action@v1
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: claude-sonnet-4-6-20250514
          max_tokens: 4096
          prompt: |
            You are a senior code reviewer. Review the following PR diff and provide constructive feedback.

            PR Title: ${{ github.event.pull_request.title }}
            PR Description: ${{ github.event.pull_request.body }}

            Diff:
            ${{ steps.diff.outputs.diff }}

            Please review the code focusing on:
            1. Bugs or potential issues
            2. Security vulnerabilities
            3. Performance concerns
            4. Code style and readability
            5. Test coverage

            Format your review as a clear, concise markdown comment.
            If the code looks good, say so briefly. Do not be overly nitpicky.

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const review = `${{ steps.review.outputs.response }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 Claude Code Review\n\n${review}`
            });
